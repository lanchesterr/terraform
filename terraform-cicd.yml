name: Terraform CI/CD

on:
  pull_request:
    branches: [master]
    paths:
      - 'environments/dev/**'
  push:
    branches: [master]
    paths:
      - 'environments/dev/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/dev

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS}}
      
      - name: Terraform Init
        run: terraform init


      - name: Terraform Plan
        run: |
          # Wyłącz interaktywne pytania
          export TF_INPUT=0
          terraform plan -out=tfplan -var="admin_username=azureuser" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" -no-color

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ github.token }}
          planfile: ${{ github.workspace }}/environments/dev/tfplan
          working-directory: ${{ github.workspace }}/environments/dev

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan


